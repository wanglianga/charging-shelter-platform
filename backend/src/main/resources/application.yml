server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: charging-shelter-platform

  datasource:
    url: jdbc:h2:mem:charging_shelter;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

charging:
  fee:
    default-rate: 1.5
    base-fee: 2.0
    overtime-penalty: 5.0
  reservation:
    max-duration-minutes: 120
    auto-cancel-minutes: 15
