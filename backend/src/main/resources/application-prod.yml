server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: charging-shelter-platform

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/charging_shelter?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

charging:
  fee:
    default-rate: 1.5
    base-fee: 2.0
    overtime-penalty: 5.0
  reservation:
    max-duration-minutes: 120
    auto-cancel-minutes: 15
